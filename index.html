<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irfan Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<!-- ICON -->
<script src="https://fontawesome.com" crossorigin="anonymous"></script>
<script src="https://smartclass.ours.web.id/" crossorigin="web_belajar"></script>

<style>
body {
  margin: 0;
  background: #020617;
  color: white;
  font-family: 'Orbitron', sans-serif;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  background: rgba(0,0,0,0.6);
  padding: 15px;
  text-align: center;
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav a {
  color: #38bdf8;
  margin: 0 15px;
  text-decoration: none;
}

nav a:hover {
  color: #22c55e;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.hero img {
  width: 120px;
  border-radius: 50%;
  border: 2px solid #38bdf8;
  margin-bottom: 15px;
}

.hero h1 {
  color: #38bdf8;
}

#typing {
  color: #22c55e;
}

/* SECTION */
section {
  padding: 80px 20px;
}

h2 {
  text-align: center;
  color: #22c55e;
}

/* CARD */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #0f172a;
  margin: 10px;
  padding: 20px;
  border-radius: 15px;
  width: 250px;
  text-align: center;
  transition: 0.3s;
  border: 1px solid #1e293b;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #38bdf8;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #020617;
  padding: 20px;
  border-radius: 10px;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>

</head>

<body>

<canvas id="matrix"></canvas>

<nav>
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#skills">Skills</a>
  <a href="#projects">Projects</a>
</nav>

<div class="hero" id="home">
  <img src="https://i.pravatar.cc/150" alt="profile">
  <h1>Irfan Iswandi</h1>
  <p id="typing"></p>
</div>

<section id="about" data-aos="fade-up">
  <h2>About Me</h2>
  <p style="text-align:center; max-width:600px; margin:auto;">
    Saya fokus pada networking, cybersecurity, dan pengembangan tools berbasis Linux.
  </p>
</section>

<section id="skills" data-aos="fade-up">
  <h2>Skills</h2>
  <div class="container">
    <div class="card">🌐 Networking</div>
    <div class="card">🛡️ Cybersecurity</div>
    <div class="card">💻 Programming</div>
    <div class="card">🐧 Linux</div>
  </div>
</section>

<section id="projects" data-aos="fade-up">
  <h2>Projects</h2>
  <div class="container">

    <div class="card" onclick="openModal('EvilPunk Tool - Simulasi keamanan WiFi')">
      EvilPunk Tool
    </div>

    <div class="card" onclick="openModal('WiPrank - Simulasi prank jaringan')">
      WiPrank
    </div>

  </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" id="modalContent"></div>
</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init();

// typing
const text = "Network Engineer | Cybersecurity | Developer";
let i = 0;
function typing() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}
typing();

// modal
function openModal(text) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalContent").innerText = text;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// matrix
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#0f0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters.charAt(Math.floor(Math.random()*letters.length));
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}
setInterval(draw, 33);
</script>

</body>
</html>
