<!DOCTYPE html>
<html>
<head>
<title>WiPrank OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: black;
  color: #0f0;
  font-family: monospace;
  margin: 0;
  padding: 20px;
}

#terminal {
  white-space: pre-wrap;
}

.input-line {
  display: flex;
}

input {
  background: black;
  border: none;
  color: #0f0;
  outline: none;
  font-family: monospace;
  width: 100%;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 20px;
  background: #22c55e;
  color: black;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<h3>🖥️ WiPrank OS v1.0</h3>

<div id="terminal"></div>

<div class="input-line">
  <span>root@wiprank:~# </span>
  <input id="command" autofocus>
</div>

<br>

<a href="https://drive.google.com/drive/folders/1sl4mLTFYMV8RFpTGDr6UoGPiUX7fh2Rs" target="_blank" class="btn">
  ⬇ Download Tool
</a>

<br><br>
<a href="index.html" class="btn">⬅ Kembali</a>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("command");

const responses = {
  help: "Available commands:\nhelp\nrun\nclear\nabout\ndownload",
  run: "Launching prank...\nSending popup...\nTarget lagging...\nSuccess ✔",
  about: "WiPrank Tool - Network prank simulation",
  download: "Opening download link..."
};

function print(text) {
  terminal.innerHTML += text + "\n";
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const cmd = input.value.trim();

    print("root@wiprank:~# " + cmd);

    if (responses[cmd]) {
      print(responses[cmd]);

      if (cmd === "download") {
        window.open("https://drive.google.com/drive/folders/https://drive.google.com/file/d/1BPtVf-H6tRFWiSFot3_s_FQqUlEFvuin/view?usp=drive_link");
      }

    } else if (cmd === "clear") {
      terminal.innerHTML = "";
    } else {
      print("Command not found");
    }

    input.value = "";
  }
});

// booting effect
const boot = [
  "Booting WiPrank OS...",
  "Loading modules...",
  "Initializing system...",
  "System ready ✔",
  ""
];

let i = 0;
function booting() {
  if (i < boot.length) {
    print(boot[i]);
    i++;
    setTimeout(booting, 400);
  }
}

booting();
</script>

</body>
</html>
