<!DOCTYPE html>
<html>
<head>
<title>WiPrank OS</title>

<style>
body {
  background: black;
  color: #0f0;
  font-family: monospace;
  padding: 20px;
}

#terminal {
  white-space: pre-line;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 20px;
  background: #22c55e;
  color: black;
  text-decoration: none;
  border-radius: 5px;
}

  background: #38bdf8;
}
</style>

<body>

<h2>🖥️ WiPrank OS Simulation</h2>

<div id="terminal"></div>

<!-- BUTTON DOWNLOAD -->
<br>
<a href="https://drive.google.com/uc?export=download&id=1BPtVf-H6tRFWiSFot3_s_FQqUlEFvuin" target="_blank" class="btn">
  ⬇ Download Tool
</a>

<br><br>
<a href="index.html" class="btn">⬅ Kembali</a>

<script>
const lines = [
  "Booting WiPrank OS...",
  "Loading kernel modules...",
  "Initializing network interface...",
  "Injecting prank payload...",
  "System ready ✔",
  "",
  "root@wiprank:~# type 'help' to begin"
];

let i = 0;

function typeLine() {
  if (i < lines.length) {
    document.getElementById("terminal").innerHTML += lines[i] + "\n";
    i++;
    setTimeout(typeLine, 400);
  }
}

typeLine();

// INTERACTIVE COMMAND
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const cmd = prompt("root@wiprank:~#");

    if (cmd === "help") {
      alert("Commands:\nrun\ndownload\nabout");
    }

    else if (cmd === "run") {
      alert("Launching prank...\nTarget lagging...\nSuccess ✔");
    }

    else if (cmd === "download") {
      window.open("https://drive.google.com/uc?export=download&id=1BPtVf-H6tRFWiSFot3_s_FQqUlEFvuin");
    }

    else if (cmd === "about") {
      alert("WiPrank Tool - Network prank simulation");
    }

    else {
      alert("Command not found");
    }
  }
});
</script>

</body>
</html>
